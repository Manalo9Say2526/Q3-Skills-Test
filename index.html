<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>MEMBER SIGN-UP</h1>
        <br>
        
        <h4>STUDENT DETAILS</h4>
        <label>Fullname:</label>
        <input type="text" class="form-control">

        <h4>TICKET SELECTION</h4>
            <p>Quantity (₱250.00 Each)</p>
        <input type="number" id="price" value="0" min="0" class="form-control">

        <h4>PAYMENT DETAILS</h4>    
        <label>Subtotal</label>
        <input type="number" id="subtotal" class="form-control" readonly>
        <br>
        <label>Admin Fee</label>
        <input type="number" id="fee" value="50" class="form-control" readonly>
        <hr>
        <label>Total</label>
        <input type="number" id="total" class="form-control" readonly>

        <br><br>
        <button type="button" class="btn btn-success" onclick="verbNoun()">REGISTER</button>
     </div>

     <script src="main.js"></script>
</body>
</html>
